name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:      # allow running the gate manually from the Actions tab

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: py${{ matrix.python }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows parked for now (2026-07-20): the app targets macOS, and the
        # first real Windows runner (run 29760557912) failed on a test-only
        # bug (see tests/test_backups.py, fixed same commit) rather than a
        # product one. Re-add if/when Windows becomes a supported target.
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      # The four checks (ruff · format · mypy · pytest-with-coverage) live in
      # scripts/ci.py so local dev (`make ci`) and CI share one source of truth
      # and can't drift. The coverage floor is enforced on every matrix cell.
      - name: CI gate (ruff + format + mypy + pytest w/ coverage floor)
        run: uv run python scripts/ci.py
