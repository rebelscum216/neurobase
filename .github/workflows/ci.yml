name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: py${{ matrix.python }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      # The four checks (ruff · format · mypy · pytest) live in scripts/ci.py so
      # local dev (`make ci`) and CI share one source of truth and can't drift.
      - name: CI gate (ruff + format + mypy + pytest)
        run: uv run python scripts/ci.py
