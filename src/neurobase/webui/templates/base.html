<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Neurobase UI — Suggestions{% endblock %}</title>
    <style>
      :root {
        color-scheme: light dark;
        --accent: #0c8c86;
        --bg: #f2f5f5;
        --surface: #ffffff;
        --border: #d7e0df;
        --fg: #182223;
        --fg-muted: #56655f;
        --danger: #b3311f;
        --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --proposed-bg: #fdf1cf;
        --proposed-fg: #7a5900;
        --accepted-bg: #d9f1e8;
        --accepted-fg: #0a5b40;
        --rejected-bg: #fbe1e1;
        --rejected-fg: #8f2020;
        --superseded-bg: #e7e7ee;
        --superseded-fg: #46465a;
        --diff-add-bg: #e3f7ec;
        --diff-add-fg: #146b45;
        --diff-del-bg: #fbe7e7;
        --diff-del-fg: #922b2b;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --accent: #2fcfc0;
          --bg: #0f1516;
          --surface: #161f21;
          --border: #29393c;
          --fg: #e7efef;
          --fg-muted: #9fb3b0;
          --danger: #e2665a;
          --proposed-bg: #3a2f10;
          --proposed-fg: #f1c979;
          --accepted-bg: #0f3226;
          --accepted-fg: #7fe3bd;
          --rejected-bg: #3a1717;
          --rejected-fg: #f3a6a6;
          --superseded-bg: #26262f;
          --superseded-fg: #b6b6cf;
          --diff-add-bg: #113626;
          --diff-add-fg: #8fe3ba;
          --diff-del-bg: #3a1616;
          --diff-del-fg: #f3a6a6;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font: 15px/1.55 var(--sans);
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.85rem 1.5rem;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }
      .brand {
        font-weight: 700;
        font-size: 1.05rem;
        color: var(--fg);
      }
      .brand .accent {
        color: var(--accent);
      }
      .page {
        max-width: 960px;
        margin: 0 auto;
        padding: 1.75rem 1.5rem 4rem;
      }
      h1,
      h2 {
        font-weight: 600;
      }
      h1 {
        font-size: 1.3rem;
        margin: 0 0 1rem;
      }
      h2 {
        font-size: 1rem;
        margin: 0 0 0.75rem;
      }
      .mono {
        font-family: var(--mono);
      }
      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1.25rem 1.5rem;
        margin-bottom: 1.25rem;
      }
      .status-chip {
        display: inline-block;
        padding: 0.15rem 0.65rem;
        border-radius: 999px;
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        vertical-align: middle;
      }
      .status-chip.proposed {
        background: var(--proposed-bg);
        color: var(--proposed-fg);
      }
      .status-chip.accepted {
        background: var(--accepted-bg);
        color: var(--accepted-fg);
      }
      .status-chip.rejected {
        background: var(--rejected-bg);
        color: var(--rejected-fg);
      }
      .status-chip.superseded {
        background: var(--superseded-bg);
        color: var(--superseded-fg);
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        text-align: left;
        padding: 0.55rem 0.6rem;
        border-bottom: 1px solid var(--border);
        font-size: 0.92rem;
      }
      th {
        color: var(--fg-muted);
        font-weight: 600;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      tbody tr:last-child td {
        border-bottom: none;
      }
      .metrics-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 1.5rem 2rem;
      }
      .metric {
        display: flex;
        flex-direction: column;
        gap: 0.15rem;
      }
      .metric .label {
        font-size: 0.68rem;
        color: var(--fg-muted);
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      .metric .value {
        font-family: var(--mono);
        font-size: 0.95rem;
      }
      .btn {
        display: inline-block;
        padding: 0.45rem 0.9rem;
        border-radius: 6px;
        border: 1px solid var(--accent);
        color: var(--accent);
        background: transparent;
        font: inherit;
        font-weight: 600;
        font-size: 0.88rem;
        cursor: pointer;
      }
      .btn:hover {
        background: var(--accent);
        color: var(--surface);
        text-decoration: none;
      }
      .btn.danger {
        border-color: var(--danger);
        color: var(--danger);
      }
      .btn.danger:hover {
        background: var(--danger);
        color: var(--surface);
      }
      .actions {
        display: flex;
        gap: 0.6rem;
        flex-wrap: wrap;
        margin-top: 1rem;
      }
      form.inline {
        display: inline;
      }
      textarea {
        width: 100%;
        min-height: 22rem;
        font-family: var(--mono);
        font-size: 0.88rem;
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.75rem;
      }
      pre.diff,
      pre.body {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.9rem 1rem;
        overflow-x: auto;
        font-family: var(--mono);
        font-size: 0.82rem;
        white-space: pre;
        margin: 0;
      }
      .diff-line.diff-add {
        color: var(--diff-add-fg);
        background: var(--diff-add-bg);
        display: block;
      }
      .diff-line.diff-del {
        color: var(--diff-del-fg);
        background: var(--diff-del-bg);
        display: block;
      }
      .flash {
        padding: 0.7rem 1rem;
        border-radius: 8px;
        background: var(--accepted-bg);
        color: var(--accepted-fg);
        margin-bottom: 1.25rem;
        font-size: 0.9rem;
      }
      .warning {
        padding: 0.7rem 1rem;
        border-radius: 8px;
        background: var(--proposed-bg);
        color: var(--proposed-fg);
        margin-bottom: 1.25rem;
        font-size: 0.9rem;
      }
      .status-code {
        font-family: var(--mono);
        color: var(--danger);
      }
      dl.meta {
        display: grid;
        grid-template-columns: max-content 1fr;
        gap: 0.35rem 1rem;
        margin: 0;
      }
      dl.meta dt {
        color: var(--fg-muted);
        font-size: 0.8rem;
      }
      dl.meta dd {
        margin: 0;
        font-family: var(--mono);
        font-size: 0.86rem;
      }
      ul.plain {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }
      ul.plain li {
        font-size: 0.86rem;
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/suggestions">Neurobase UI — <span class="accent">Suggestions</span></a>
      <nav><a href="/suggestions">All suggestions</a></nav>
    </header>
    <main class="page">{% block content %}{% endblock %}</main>
  </body>
</html>
