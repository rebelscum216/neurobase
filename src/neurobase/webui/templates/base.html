<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Neurobase UI — Suggestions{% endblock %}</title>
    <style>
      :root {
        /* Single-theme, warm-paper light — matches the motion-view template,
           which commits to one visual world and has no dark variant. */
        color-scheme: light;
        --outer: #eceded;
        --canvas: #f6f6f3;
        --rail: #fbfbfa;
        --paper: #ffffff;
        --panel-2: #f0f0ee;
        --ink: #292929;
        --mid: #5d5d5d;
        --muted: #9e9e9e;
        --line: #e8e8e5;
        --line-2: #dcdcd6;

        --blue: #1b9cf0; --blue-2: #1686cc; --blue-soft: #eaf6fe;
        --green: #2f9b70; --green-2: #227a57; --green-soft: #eaf6f0;
        --violet: #8068c9; --violet-2: #6b54b3; --violet-soft: #f0ecfa;
        --amber: #b7791f; --amber-2: #8f6216; --amber-soft: #fbf3e2;
        --red: #c1443b; --red-2: #a3362e; --red-soft: #fbeae8;

        --sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
        --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
        --r: 16px; --r-sm: 10px;
        --shadow: 0 1px 1px rgba(41, 41, 41, 0.02), 0 20px 50px -26px rgba(41, 41, 41, 0.22);
        --shadow-lg: 0 26px 70px rgba(41, 41, 41, 0.11), 0 3px 10px rgba(41, 41, 41, 0.05);
        --aurora-blue: rgba(27, 156, 240, 0.10);
        --aurora-violet: rgba(128, 104, 201, 0.08);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        background: var(--outer); color: var(--ink);
        font: 14.5px/1.55 var(--sans); letter-spacing: -0.1px;
        -webkit-font-smoothing: antialiased;
        height: 100vh; overflow: hidden; padding: 16px;
      }
      a { color: var(--blue-2); text-decoration: none; }
      a:hover { text-decoration: underline; }
      a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible {
        outline: 2px solid var(--blue); outline-offset: 2px; border-radius: 4px;
      }
      h1, h2 { font-weight: 660; letter-spacing: -0.3px; margin: 0 0 0.75rem; color: var(--ink); }
      h1 { font-size: 1.3rem; }
      h2 { font-size: 1rem; }
      .mono { font-family: var(--mono); }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation: none !important; transition: none !important; }
      }

      /* ============ FLOATING WINDOW CHROME ============ */
      .window {
        max-width: 1440px; height: 100%; margin: 0 auto;
        background: var(--paper); border: 1px solid var(--line-2); border-radius: 18px;
        box-shadow: var(--shadow-lg); overflow: hidden;
        display: flex; flex-direction: column;
      }
      .chrome {
        height: 44px; flex: none; display: flex; align-items: center; padding: 0 16px;
        background: var(--rail); border-bottom: 1px solid var(--line); position: relative; z-index: 10;
      }
      .traffic { display: flex; gap: 8px; }
      .traffic .dot { width: 11px; height: 11px; border-radius: 50%; }
      .traffic .red { background: #ff6a5f; }
      .traffic .yellow { background: #f5be4f; }
      .traffic .green { background: #61c454; }
      .chrome-center {
        position: absolute; left: 50%; transform: translateX(-50%);
        font-family: var(--mono); font-size: 11.5px; color: var(--muted);
        display: flex; align-items: center; gap: 7px;
      }
      .lock {
        width: 10px; height: 10px; border: 1.4px solid var(--muted); border-radius: 2px; position: relative;
      }
      .lock::before {
        content: ""; position: absolute; width: 6px; height: 5px; left: 0.5px; top: -5.5px;
        border: 1.4px solid var(--muted); border-bottom: 0; border-radius: 5px 5px 0 0;
      }

      /* ============ APP SHELL ============ */
      .app { flex: 1; display: grid; grid-template-columns: 224px 1fr; min-height: 0; overflow: hidden; }

      .rail {
        background: var(--rail); border-right: 1px solid var(--line);
        display: flex; flex-direction: column; min-height: 0; overflow-y: auto; z-index: 8;
      }
      .brand { display: flex; align-items: center; gap: 9px; padding: 18px 16px 4px; }
      .brand .mark {
        width: 24px; height: 24px; border-radius: 7px; flex: none;
        background: radial-gradient(circle at 30% 28%, var(--blue) 0%, transparent 60%),
                    radial-gradient(circle at 72% 74%, var(--violet) 0%, transparent 58%),
                    var(--panel-2);
        box-shadow: inset 0 0 0 1px var(--line-2);
      }
      .brand .name { font-family: var(--mono); font-weight: 700; font-size: 13.5px; letter-spacing: -0.02em; color: var(--ink); }
      .brand .name b { color: var(--blue-2); font-weight: 700; }
      .brand .store {
        display: block; font-family: var(--mono); font-size: 10px; color: var(--muted);
        padding: 6px 16px 14px; overflow-wrap: anywhere;
      }

      .rail nav { padding: 4px 10px; display: flex; flex-direction: column; gap: 1px; }
      .navitem {
        display: flex; align-items: center; gap: 9px; height: 33px; padding: 0 10px;
        border-radius: 8px; font-size: 13px; font-weight: 500; position: relative; overflow: hidden;
        transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
      }
      a.navitem { color: var(--mid); }
      a.navitem:hover { transform: translateX(3px); background: var(--panel-2); color: var(--ink); text-decoration: none; }
      a.navitem.on { background: var(--panel-2); color: var(--ink); font-weight: 620; }
      a.navitem.on::before {
        content: ""; position: absolute; left: 0; top: 7px; bottom: 7px; width: 2px;
        background: var(--ink); border-radius: 3px;
      }
      span.navitem { color: var(--muted); cursor: default; }
      .navitem .glyph { width: 15px; text-align: center; font-size: 12px; opacity: 0.85; flex: none; }
      .navitem .soon {
        margin-left: auto; font-family: var(--mono); font-size: 8.5px; letter-spacing: 0.05em;
        color: var(--muted); border: 1px dashed var(--line-2); border-radius: 4px; padding: 1px 5px;
        text-transform: uppercase;
      }

      .rail-foot {
        margin-top: auto; border-top: 1px solid var(--line); padding: 11px 16px;
        display: flex; align-items: center; gap: 8px;
        font-family: var(--mono); font-size: 10px; color: var(--muted);
      }
      .pulse-dot {
        width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex: none;
        animation: pulse 2.2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(47, 155, 112, 0.4); }
        60% { box-shadow: 0 0 0 5px rgba(47, 155, 112, 0); }
      }

      /* ---- main column (aurora canvas) ---- */
      .main {
        position: relative; display: flex; flex-direction: column; min-width: 0; min-height: 0;
        background: var(--canvas); overflow: hidden;
      }
      .aurora { position: absolute; inset: 0; pointer-events: none; overflow: hidden; opacity: 0.7; z-index: 0; }
      .aurora::before, .aurora::after {
        content: ""; position: absolute; border-radius: 50%; filter: blur(48px);
        mix-blend-mode: multiply; animation: aurora 15s ease-in-out infinite alternate;
      }
      .aurora::before { width: 420px; height: 420px; background: var(--aurora-blue); left: 24%; top: 6%; }
      .aurora::after { width: 360px; height: 360px; background: var(--aurora-violet); left: 60%; top: 44%; animation-delay: -6s; }
      @keyframes aurora {
        0% { transform: translate3d(-26px, -16px, 0) scale(0.95); }
        55% { transform: translate3d(30px, 22px, 0) scale(1.08); }
        100% { transform: translate3d(-8px, 40px, 0) scale(1); }
      }

      .topbar {
        height: 50px; flex: none; display: flex; align-items: center; gap: 12px; padding: 0 22px;
        background: rgba(251, 251, 250, 0.86); backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--line); position: relative; z-index: 6;
      }
      .crumb { font-family: var(--mono); font-size: 11.5px; color: var(--muted); }
      .crumb b { color: var(--ink); font-weight: 600; }
      .local-pill {
        margin-left: auto; display: flex; align-items: center; gap: 6px;
        font-family: var(--mono); font-size: 10px; color: var(--mid);
        border: 1px solid var(--line); border-radius: 999px; padding: 4px 11px; background: var(--paper);
      }
      .local-pill .pulse-dot { width: 6px; height: 6px; }

      .scroll { flex: 1; min-height: 0; overflow-y: auto; position: relative; z-index: 1; }
      .page { max-width: 1120px; margin: 0 auto; padding: 1.6rem 1.75rem 4rem; width: 100%; }
      .page.narrow { max-width: 760px; }
      .page > * { animation: rise 0.6s cubic-bezier(0.22, 0.9, 0.27, 1) backwards; }
      .page > *:nth-child(2) { animation-delay: 0.06s; }
      .page > *:nth-child(3) { animation-delay: 0.12s; }
      .page > *:nth-child(4) { animation-delay: 0.18s; }
      @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

      /* ---- hero heading + pill row (motion-view header strip) ---- */
      .hero { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 1.15rem; }
      .hero h1 { margin: 0 0 5px; }
      .hero-sub { margin: 0; font-size: 0.86rem; color: var(--mid); }
      .hero-pills { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; }
      .hero-pill {
        display: inline-flex; align-items: center; gap: 6px; height: 30px; padding: 0 13px;
        border-radius: 999px; border: 1px solid var(--line); background: rgba(255, 255, 255, 0.86);
        backdrop-filter: blur(10px); font-family: var(--mono); font-size: 10.5px; color: var(--mid);
        white-space: nowrap;
      }

      /* ============ COMPONENTS ============ */
      .panel {
        background: rgba(255, 255, 255, 0.86); backdrop-filter: blur(10px);
        border: 1px solid var(--line); border-radius: var(--r);
        padding: 1.3rem 1.5rem; margin-bottom: 1.15rem; box-shadow: var(--shadow);
      }

      .status-chip {
        display: inline-flex; align-items: center; gap: 5px; padding: 0.16rem 0.65rem; border-radius: 999px;
        font-family: var(--mono); font-size: 0.68rem; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.04em; vertical-align: middle;
      }
      .status-chip.proposed { background: var(--amber-soft); color: var(--amber-2); }
      .status-chip.accepted { background: var(--green-soft); color: var(--green-2); }
      .status-chip.rejected { background: var(--red-soft); color: var(--red-2); }
      .status-chip.superseded { background: var(--panel-2); color: var(--mid); }

      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 0.6rem 0.6rem; border-bottom: 1px solid var(--line); font-size: 0.88rem; }
      th {
        color: var(--muted); font-weight: 600; font-family: var(--mono); font-size: 0.66rem;
        text-transform: uppercase; letter-spacing: 0.04em;
      }
      tbody tr:last-child td { border-bottom: none; }
      tbody tr:hover td { background: var(--panel-2); }

      .metrics-strip { display: flex; flex-wrap: wrap; gap: 1.4rem 2rem; }
      .metric { display: flex; flex-direction: column; gap: 0.2rem; }
      .metric .label {
        font-family: var(--mono); font-size: 0.65rem; color: var(--muted);
        text-transform: uppercase; letter-spacing: 0.04em;
      }
      .metric .value { font-family: var(--mono); font-size: 0.92rem; font-variant-numeric: tabular-nums; }

      .btn {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 0.52rem 1rem; border-radius: var(--r-sm);
        border: 1px solid var(--line-2); color: var(--mid); background: var(--paper);
        font: inherit; font-weight: 600; font-size: 0.85rem; cursor: pointer;
        transition: border-color 0.18s ease, color 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
      }
      .btn:hover { border-color: var(--blue); color: var(--blue-2); text-decoration: none; transform: translateY(-2px); box-shadow: 0 8px 20px -8px rgba(41, 41, 41, 0.18); }
      .btn.danger:hover { border-color: var(--red); color: var(--red); box-shadow: none; }
      .btn.primary {
        background: var(--ink); border-color: var(--ink); color: #fff;
        position: relative; overflow: hidden;
      }
      .btn.primary::before {
        content: ""; position: absolute; top: -30px; left: -34px; width: 22px; height: 92px;
        background: rgba(255, 255, 255, 0.22); transform: rotate(28deg); animation: shine 3.6s infinite;
      }
      @keyframes shine { 0%, 55% { left: -34px; } 82%, 100% { left: 150%; } }
      .btn.primary:hover { filter: brightness(1.14); border-color: var(--ink); box-shadow: 0 10px 24px -8px rgba(41, 41, 41, 0.3); }

      .actions { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 1rem; }
      form.inline { display: inline; }

      textarea {
        width: 100%; min-height: 22rem; font-family: var(--mono); font-size: 0.86rem;
        background: var(--canvas); color: var(--ink); border: 1px solid var(--line);
        border-radius: var(--r-sm); padding: 0.75rem;
      }

      pre.diff, pre.body {
        background: var(--canvas); border: 1px solid var(--line); border-radius: var(--r-sm);
        padding: 0.9rem 1rem; overflow-x: auto; font-family: var(--mono); font-size: 0.8rem;
        white-space: pre; margin: 0;
      }
      .diff-line.diff-add { color: var(--green-2); background: var(--green-soft); display: block; }
      .diff-line.diff-del { color: var(--red-2); background: var(--red-soft); display: block; }

      .flash {
        padding: 0.7rem 1rem; border-radius: var(--r-sm); background: var(--green-soft);
        color: var(--green-2); margin-bottom: 1.15rem; font-size: 0.88rem; border: 1px solid var(--line);
      }
      .warning {
        padding: 0.7rem 1rem; border-radius: var(--r-sm); background: var(--amber-soft);
        color: var(--amber-2); margin-bottom: 1.15rem; font-size: 0.88rem; border: 1px solid var(--line);
      }
      .status-code { font-family: var(--mono); color: var(--red-2); font-weight: 700; }

      dl.meta { display: grid; grid-template-columns: max-content 1fr; gap: 0.4rem 1rem; margin: 0; }
      dl.meta dt { color: var(--muted); font-size: 0.78rem; }
      dl.meta dd { margin: 0; font-family: var(--mono); font-size: 0.84rem; }

      ul.plain { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 0.4rem; }
      ul.plain li { font-size: 0.84rem; color: var(--mid); }

      /* ============ DASHBOARD CARD GRID (motion-view stage) ============ */
      .dash-grid { display: grid; grid-template-columns: minmax(0, 1.6fr) 320px; gap: 14px; margin-bottom: 14px; }
      .dash-lower { display: grid; grid-template-columns: 1.5fr 1fr; gap: 14px; margin-bottom: 14px; }
      @media (max-width: 720px) { .dash-grid, .dash-lower { grid-template-columns: 1fr; } }

      .card {
        background: rgba(255, 255, 255, 0.88); backdrop-filter: blur(10px);
        border: 1px solid var(--line); border-radius: var(--r); box-shadow: var(--shadow);
        padding: 1.1rem 1.3rem 1.2rem;
      }
      .card-head { display: flex; align-items: flex-start; margin-bottom: 0.95rem; }
      .card-head h2 { font-size: 0.86rem; margin: 0; font-weight: 660; }
      .card-head p { font-size: 0.68rem; color: var(--muted); margin: 3px 0 0; }
      .card-head .right { margin-left: auto; display: flex; align-items: center; gap: 7px; }
      .tiny-pill {
        font-family: var(--mono); font-size: 0.62rem; color: var(--mid);
        border: 1px solid var(--line); border-radius: 999px; padding: 4px 9px; background: var(--paper);
        white-space: nowrap;
      }
      .tiny-pill.ok { color: var(--green-2); border-color: transparent; background: var(--green-soft); }

      .card table th, .card table td { font-size: 0.82rem; padding: 0.5rem 0.55rem; }

      .signal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
      .signal-tile { border: 1px solid var(--line); border-radius: 12px; padding: 11px 12px; background: var(--canvas); }
      .signal-tile.wide { grid-column: 1 / -1; }
      .signal-label { font-family: var(--mono); font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
      .signal-value { font-size: 1.42rem; font-weight: 680; margin-top: 5px; letter-spacing: -0.5px; font-variant-numeric: tabular-nums; }
      .signal-value.small { font-size: 0.92rem; font-weight: 600; }

      .proc { display: flex; flex-direction: column; gap: 0.75rem; }
      .proc-top { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; }
      .proc-name { font-weight: 550; }
      .proc-val { margin-left: auto; font-family: var(--mono); font-size: 0.78rem; color: var(--mid); font-variant-numeric: tabular-nums; }
      .bar { height: 6px; border-radius: 999px; background: var(--panel-2); margin-top: 7px; overflow: hidden; }
      .bar > i { display: block; height: 100%; border-radius: 999px; }
      .bar > i.green { background: linear-gradient(90deg, var(--green), #7dd2ad); }
      .bar > i.red { background: linear-gradient(90deg, var(--red), #e59089); }
      .bar > i.amber { background: linear-gradient(90deg, var(--amber), #e7bb6e); }

      @media (max-width: 820px) {
        body { padding: 0; }
        .window { border-radius: 0; border: none; max-width: none; }
        .app { grid-template-columns: 1fr; }
        .rail { flex-direction: row; flex-wrap: wrap; align-items: center; border-right: none; border-bottom: 1px solid var(--line); }
        .rail nav { flex-direction: row; flex-wrap: wrap; }
        .brand .store, .rail-foot { display: none; }
        .hero { flex-direction: column; }
        .hero-pills { margin-left: 0; }
      }
    </style>
  </head>
  <body>
    <div class="window">
      <div class="chrome">
        <div class="traffic" aria-hidden="true">
          <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
        </div>
        <div class="chrome-center"><span class="lock" aria-hidden="true"></span> local.neurobase / suggestions</div>
      </div>
      <div class="app">
        <aside class="rail">
          <div class="brand">
            <span class="mark" aria-hidden="true"></span>
            <span class="name">neuro<b>base</b></span>
          </div>
          <span class="store mono">{{ store_root_label }}</span>
          <nav aria-label="Primary">
            <a class="navitem on" href="/suggestions"><span class="glyph">△</span> Suggestions</a>
            <span class="navitem"><span class="glyph">◉</span> Graph <span class="soon">soon</span></span>
            <span class="navitem"><span class="glyph">◵</span> Sessions <span class="soon">soon</span></span>
            <span class="navitem"><span class="glyph">◈</span> Memory <span class="soon">soon</span></span>
            <span class="navitem"><span class="glyph">✦</span> Skills <span class="soon">soon</span></span>
            <span class="navitem"><span class="glyph">◷</span> Status <span class="soon">soon</span></span>
          </nav>
          <div class="rail-foot"><span class="pulse-dot" aria-hidden="true"></span> server running</div>
        </aside>
        <div class="main">
          <div class="aurora" aria-hidden="true"></div>
          <div class="topbar">
            <span class="crumb">neurobase / <b>Suggestions</b></span>
            <span class="local-pill"><span class="pulse-dot" aria-hidden="true"></span>127.0.0.1 only</span>
          </div>
          <div class="scroll">
            <main class="page {% block page_class %}{% endblock %}">{% block content %}{% endblock %}</main>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
