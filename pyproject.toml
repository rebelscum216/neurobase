[project]
name = "neurobase-cli"
version = "0.1.0.dev0"
description = "Local-first, cross-agent memory layer for coding agents — captures, curates, injects, and recommends."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [{ name = "The Neurobase Authors" }]
keywords = ["memory", "agents", "claude-code", "codex", "mcp", "local-first", "obsidian"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development",
]
dependencies = [
    "typer>=0.12",
]

[project.urls]
Homepage = "https://github.com/rebelscum216/neurobase"
Repository = "https://github.com/rebelscum216/neurobase"
Issues = "https://github.com/rebelscum216/neurobase/issues"

# Command `neurobase` → the Typer app (decision D2). Typer instances are callable,
# so this entry point runs the CLI. The fast `neurobase hook …` path (D4) gets a
# Typer-light implementation in Phase 4/5.
[project.scripts]
neurobase = "neurobase.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/neurobase"]

# Dev toolchain (build-plan §9). `uv sync` installs this group by default.
[dependency-groups]
dev = [
    "pytest>=8",
    "ruff>=0.6",
    "mypy>=1.11",
    "pre-commit>=3.8",
]

[tool.ruff]
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

# Lenient to start (build-plan §9); tighten as the codebase grows.
[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
